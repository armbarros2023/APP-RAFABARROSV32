
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equipe Rafael Barros - Gestão de Clínicas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#0284c7', // sky-600
                light: '#03a9f4',   // sky-500
                dark: '#075985',    // sky-800
              },
              secondary: {
                DEFAULT: '#10b981', // emerald-500
                light: '#34d399',   // emerald-400
                dark: '#059669',    // emerald-600
              },
              accent: {
                DEFAULT: '#f59e0b', // amber-500
              },
              'amarelo-logo': '#fde047', // yellow-300 para o splash
            },
            keyframes: {
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'scale-in-center': {
                '0%': { transform: 'scale(0.8)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              }
            },
            animation: {
              'fade-in': 'fade-in 1s ease-out forwards',
              'scale-in-center': 'scale-in-center 1.5s cubic-bezier(0.250, 0.460, 0.450, 0.940) forwards',
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom": "https://esm.sh/react-dom@^19.1.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.1.0/client",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.6.2",
    "recharts": "https://esm.sh/recharts@^3.0.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "@fullcalendar/react": "https://esm.sh/@fullcalendar/react@6.1.15?external=react,react-dom",
    "@fullcalendar/core": "https://esm.sh/@fullcalendar/core@6.1.15",
    "@fullcalendar/daygrid": "https://esm.sh/@fullcalendar/daygrid@6.1.15",
    "@fullcalendar/timegrid": "https://esm.sh/@fullcalendar/timegrid@6.1.15",
    "@fullcalendar/interaction": "https://esm.sh/@fullcalendar/interaction@6.1.15",
    "@fullcalendar/core/locales/pt-br": "https://esm.sh/@fullcalendar/core@6.1.15/locales/pt-br",
    "@fullcalendar/core/": "https://aistudiocdn.com/@fullcalendar/core@^6.1.19/"
  }
}
</script>
<style>
  /* FullCalendar Overrides for Tailwind compatibility */
  .fc {
    font-family: inherit;
  }
  .fc-toolbar-title {
    font-size: 1.25rem !important;
    font-weight: 600 !important;
  }
  .fc-button-primary {
    background-color: #0284c7 !important; /* primary DEFAULT */
    border-color: #0284c7 !important;
  }
  .fc-button-primary:hover {
    background-color: #075985 !important; /* primary dark */
    border-color: #075985 !important;
  }
  .fc-event {
    cursor: pointer;
  }
  /* Dark mode overrides handled by js logic or specific classes if needed */
  .dark .fc-theme-standard td, .dark .fc-theme-standard th {
     border-color: #334155; /* slate-700 */
  }
  .dark .fc-toolbar-title {
      color: #e2e8f0;
  }
  .dark .fc-col-header-cell-cushion, .dark .fc-daygrid-day-number {
      color: #e2e8f0;
  }

  /* Print Styles - Crucial for Manual/Receipts */
  @media print {
      body {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      /* Ensure links don't show URLs in print if not desired */
      a[href]:after {
        content: none !important;
      }
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-100 dark:bg-slate-900 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
